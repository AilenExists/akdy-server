# OpenResty (docker) 전용 설정
# 마운트: ./openresty/nginx.conf -> /usr/local/openresty/nginx/conf/nginx.conf
#         ./openresty/lua       -> /usr/local/openresty/nginx/lua

user                nobody;
worker_processes    auto;

# 도커 환경: 파일 대신 stderr로 출력 -> docker compose logs 로 확인
error_log           /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 도커 환경: stdout으로 출력
    access_log      /dev/stdout main;

    sendfile            on;
    server_tokens       off;
    keepalive_timeout   65;

    server {
        listen      80;
        server_name localhost;

        # 공통 보안 헤더
        add_header X-Frame-Options        "SAMEORIGIN"          always;
        add_header X-Content-Type-Options "nosniff"             always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        location /kibana {
            allow 172.19.0.1;        # 도커 브리지 네트워크 게이트웨이 허용
            allow 192.168.0.0/24;   # 내부 네트워크 허용
            allow 122.153.79.24;    # 특정 IP 허용
            deny  all;

            proxy_pass http://kibana:5601;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Kibana 웹소켓 지원
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 인증 관련 API는 세션 검증 없이 통과 (로그인/회원가입 등)
        location /api/v1/auth/ {
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://backend:8080;
        }

        # 그 외 API: Lua 인증 후 프록시
        location /api/v1/ {
            # verify_session.lua 에서 ngx.var.auth_user_id / auth_user_role 에 값 설정
            set $auth_user_id   '';
            set $auth_user_role '';

            # access 단계에서 세션 검증 (실패 시 스크립트 내부에서 ngx.exit)
            access_by_lua_file /usr/local/openresty/nginx/lua/verify_session.lua;

            # 클라이언트가 보낸 값은 무시하고 인증 결과로 덮어씀 (헤더 주입 방지)
            proxy_set_header X-User-Id   $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://backend:8080;
        }

        # 프론트엔드 (Next.js 등 HMR 웹소켓 포함)
        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://frontend:3000;
        }
    }
}