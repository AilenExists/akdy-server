version: '3.8'

services:
  openresty:
    image: openresty/openresty:alpine
    container_name: openresty
    ports:
      - "80:80"
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/lua:/usr/local/openresty/nginx/lua:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      elastic:
        condition: service_healthy
      kibana:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    container_name: frontend-app
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend-server
    expose:
      - "8080"
    env_file:
      - .secrets/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped


  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    expose:
      - "5432"
    env_file:
      - .secrets/.env
    command: postgres -c shared_buffers=256MB -c effective_cache_size=768MB -c work_mem=8MB -c maintenance_work_mem=64MB
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaper -d akdymall"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    expose:
      - "6379"
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  elastic:
    build: ./es
    container_name: elastic
    env_file:
      - .secrets/.env
    environment:
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - ./es/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es_data:/usr/share/elasticsearch/data
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:$$ELASTIC_PASSWORD http://localhost:9200 | grep -q cluster_name"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks:
      - app-network
    restart: unless-stopped

  kibana:
    image: kibana:9.4.3
    container_name: kibana
    depends_on:
      setup:
        condition: service_completed_successfully
    env_file:
      - .secrets/.env
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    networks:
      - app-network
    restart: unless-stopped

  setup:
    image: curlimages/curl:latest
    container_name: setup
    env_file:
      - .secrets/.env
    depends_on:
      elastic:
        condition: service_healthy
    entrypoint: [""]          # curl entrypoint 무효화
    command: >
      sh -c '
        while true; do
          resp=$$(curl -s -X POST -u "elastic:$$ELASTIC_PASSWORD" \
            -H "Content-Type: application/json" \
            http://elastic:9200/_security/user/kibana_system/_password \
            -d "{\"password\":\"$$ELASTICSEARCH_PASSWORD\"}");
          echo "response: $$resp";
          echo "$$resp" | grep -q "^{}" && break;
          sleep 5;
        done;
        echo "kibana_system password set";
      '
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data: