events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 기본 루트 경로는 프론트엔드 서버(3000 포트 가정)로 연결
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Webpack/Next.js 핫 리로딩 및 웹소켓 지원을 위한 설정
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 로그인, 회원가입 등 인증이 필요 없는 API (Spring Boot)
        location /api/v1/auth/ {
            proxy_pass http://auth-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 인증이 필요한 일반 비즈니스 로직 API (Ktor)
        location /api/v1/ {
            auth_request /auth/verify;

            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-Id $user_id;

            proxy_pass http://service-server:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Nginx 내부 인증 검증 엔드포인트
        location = /auth/verify {
            internal;
            proxy_pass http://auth-server:8080/auth/verify;
            
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
    }
}