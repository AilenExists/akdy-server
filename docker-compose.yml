version: '3.8'

services:
  openresty:
    image: openresty/openresty:alpine
    ports:
      - "80:80"
    volumes:
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/lua:/usr/local/openresty/nginx/lua:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    container_name: frontend-app
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend-server
    expose:
      - "8080"
    env_file:
      - .secrets/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped


  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    expose:
      - "5432"
    env_file:
      - .secrets/.env
    command: postgres -c shared_buffers=256MB -c effective_cache_size=768MB -c work_mem=8MB -c maintenance_work_mem=64MB
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaper -d akdymall"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    expose:
      - "6379"
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:9.4.3
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1500m -Xmx1500m
      - xpack.security.enabled=false #보안 설정 TODO
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    deploy:
      resources:
        limits:
          memory: 3g
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    restart: unless-stopped

  kibana:
    image: kibana:9.4.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
    depends_on:
      - elasticsearch
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data: