# OpenResty Configuration (Auth)


user                nginx; 
worker_processes    auto;
error_log           /var/log/nginx/error.log warn;
pid                 /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    
    log_format      main    '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for"';
    access_log      /var/log/nginx/access.log main;
    sendfile        on;
    server_tokens   off;
    #keepalive_timeout 65;

    server {
        listen      80;
        server_name localhost;

        location /kibana/ {
            allow 192.168.0.0/24;  # Allow access from the local network
            allow 122.153.79.24;  # Allow access from the specific IP address
            deny all;  # Deny access from all other IP addresses

            proxy_pass http://kibana:5601/;
            proxy_set_header Host $host;
        }

        location / {
            proxy_http_version 1.1;
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/v1/auth/ {
            proxy_pass http://backend:8080;
        }

        location /api/v1/ {

            # Set default values for user ID and role
            set $auth_user_id  '';
            set $auth_user_role '';

            # Remove any existing headers to prevent header injection
            proxy_set_header X-User-Id   '';
            proxy_set_header X-User-Role '';

            # Perform authentication check using OpenResty Lua script
            access_by_lua_file /etc/openresty/lua/auth.lua;

            # After authentication, set the headers with the authenticated user's ID and role
            proxy_set_header X-User-Id   $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;

            # Default proxy headers for backend communication
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://backend:8080;
        }
    }

}