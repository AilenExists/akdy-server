version: '3.8'

services:
  openresty:
    image: openresty/openresty:alpine
    ports:
      - "80:80"
    volumes:
      - ./openresty/nginx.conf:/etc/openresty/nginx.conf:ro
      - ./openresty/lua:/etc/openresty/lua:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend-app
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend-server
    expose:
      - "8080"
    env_file:
      - .secrets/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped


  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    env_file:
      - .secrets/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaper -d akdymall"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
